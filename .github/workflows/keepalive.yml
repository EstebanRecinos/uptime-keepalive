name: keepalive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ping
        env:
          PING_URL: ${{ secrets.PING_URL }}
        run: |
          if [ -z "$PING_URL" ]; then echo "Falta el secreto PING_URL"; exit 1; fi
          for i in 1 2; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 60 "$PING_URL" || echo "fallo")
            echo "Ping $i -> $code"
            [ "$i" -eq 1 ] && sleep 300
          done

      - name: Latido diario
        run: |
          git config user.name "keepalive-bot"
          git config user.email "actions@users.noreply.github.com"
          date -u +%F > last-ping.txt
          if ! git diff --quiet; then
            git add last-ping.txt
            git commit -m "keepalive $(date -u +%F)"
            git push
          fi
