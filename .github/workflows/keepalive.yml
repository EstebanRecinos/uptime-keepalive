name: keepalive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ping
        env:
          PING_URL: ${{ secrets.PING_URL }}
        run: |
          echo "Ping 1 -> $(curl -s -o /dev/null -w '%{http_code}' --max-time 60 "$PING_URL" || echo fallo)"
          sleep 300
          echo "Ping 2 -> $(curl -s -o /dev/null -w '%{http_code}' --max-time 60 "$PING_URL" || echo fallo)"

      - name: Latido diario
        run: |
          git config user.name "keepalive-bot"
          git config user.email "actions@users.noreply.github.com"
          date -u +%F > last-ping.txt
          if ! git diff --quiet; then
            git add last-ping.txt
            git commit -m "keepalive $(date -u +%F)"
            git push
          fi
